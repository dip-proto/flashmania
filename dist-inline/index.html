<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashmania</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }
      #ui-overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; font-family: 'Courier New', monospace; color: #fff;
      }
      #timer { position: absolute; top: 10px; right: 20px; font-size: 28px; color: #ff0; }
      #speed { position: absolute; top: 45px; right: 20px; font-size: 18px; color: #0ff; }
      #surface-label { position: absolute; bottom: 20px; left: 20px; font-size: 16px; color: #0f0; }
      #checkpoint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-size: 40px; color: #ff0; opacity: 0; transition: opacity 0.3s; }
      #medal-display { position: absolute; bottom: 20px; right: 20px; font-size: 20px; }
      #instructions {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; font-size: 22px; color: #fff;
      }
      #instructions h1 { font-size: 48px; color: #ff0; margin-bottom: 20px; }
      #instructions p { margin: 8px 0; }
      #instructions .key { display: inline-block; background: #333; padding: 4px 12px;
        border-radius: 6px; margin: 0 4px; color: #0ff; }
      #finish-screen {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; font-size: 28px; color: #fff; display: none;
      }
      #finish-screen h2 { font-size: 40px; color: #ff0; margin-bottom: 10px; }
      #finish-screen .medal { font-size: 60px; margin: 20px 0; }
      #finish-screen .time { font-size: 24px; color: #0ff; }
      #finish-screen .controls { font-size: 16px; color: #aaa; margin-top: 20px; }
      #ghost-toggle { position: absolute; top: 10px; left: 20px; font-size: 16px; color: #aaa; }
    </style>
    <script type="module" crossorigin src="./assets/index-8r_TjLnO.js"></script>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay">
      <div id="timer"></div>
      <div id="speed"></div>
      <div id="surface-label"></div>
      <div id="checkpoint"></div>
      <div id="medal-display"></div>
      <div id="ghost-toggle"></div>
      <div id="instructions">
        <h1>FLASHMANIA</h1>
        <p>A time trial racing game</p>
        <p style="margin-top: 30px;">
          <span class="key">W</span> Accelerate &nbsp;
          <span class="key">S</span> Brake &nbsp;
          <span class="key">A</span> Steer Left &nbsp;
          <span class="key">D</span> Steer Right
        </p>
        <p>
          <span class="key">Space</span> Drift &nbsp;
          <span class="key">R</span> Restart &nbsp;
          <span class="key">G</span> Toggle Ghost
        </p>
        <p style="margin-top: 30px; color: #ff0;">Press <span class="key">Enter</span> to start</p>
      </div>
      <div id="finish-screen">
        <h2>Race Complete!</h2>
        <div class="medal" id="medal-emoji"></div>
        <div class="time" id="final-time"></div>
        <div id="final-medal-text"></div>
        <div class="controls">Press <span class="key">R</span> to restart or <span class="key">Enter</span> to continue</div>
      </div>
    </div>
  </body>
</html>
